name: Macro Alert US30

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 13-21 * * 1-5'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Run Alert
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🔍 Recherche du fichier alert_us30.py..."
          FILE_PATH=$(find . -name "alert_us30.py" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ Fichier introuvable !"
            ls -R
            exit 1
          fi
          python "$FILE_PATH"
