name: send-macro-alert

on:
  schedule:
    # Cette ligne dit à GitHub de tourner à 07h00 UTC (soit 09h00 à Paris)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permet de relancer le bot manuellement quand tu veux

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_us30.py

