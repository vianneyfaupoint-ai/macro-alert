name: 🎾 Tennis Daily Alert

on:
  schedule:
    # Tous les jours à 7h00 heure française (UTC+2 été → 5h UTC)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  tennis-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run tennis alert
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tennis_alert.py
